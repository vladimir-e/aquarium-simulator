<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aquarium Simulator</title>
    <script>
      // Apply the resolved theme class before first paint so the themed
      // background tokens are defined immediately (no unthemed flash). Mirrors
      // useTheme's resolution; React re-affirms the same class on mount.
      (function () {
        try {
          var stored = localStorage.getItem('aquarium-theme-mode');
          var mode = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system';
          var resolved =
            mode === 'system'
              ? window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : mode;
          document.documentElement.classList.add(resolved);
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="padding: 20px; font-family: system-ui, -apple-system, sans-serif; text-align: center; background-color: #1a1a2e; color: #eee; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <h1 style="font-size: 1.5rem; margin-bottom: 1rem;">JavaScript Required</h1>
        <p style="margin-bottom: 1rem; color: #aaa;">JavaScript is required to run this application.</p>
        <p style="color: #888;">If the page is broken, <a href="?reset" style="color: #4a9eff;">click here to reset</a>.</p>
      </div>
    </noscript>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
